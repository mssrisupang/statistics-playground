// ══════════════════════════════════════════════════════
// MATH HELPERS
// ══════════════════════════════════════════════════════
const npdf=(x,m,s)=>Math.exp(-.5*((x-m)/s)**2)/(s*Math.sqrt(2*Math.PI));
function ncdf(x){
  const t=1/(1+.2316419*Math.abs(x));
  const p=t*(.319381530+t*(-.356563782+t*(1.781477937+t*(-1.821255978+t*1.330274429))));
  return x>=0?1-npdf(x,0,1)*p:npdf(x,0,1)*p;
}
// F-dist p-value via regularized incomplete beta (approximation)
function fPval(F,d1,d2){
  if(!isFinite(F)||F<=0) return 1;
  const x=d2/(d2+d1*F);
  return ibeta(x,d2/2,d1/2);
}
function ibeta(x,a,b){
  if(x<=0) return 0; if(x>=1) return 1;
  const lbeta=lgamma(a)+lgamma(b)-lgamma(a+b);
  const bt=Math.exp(Math.log(x)*a+Math.log(1-x)*b-lbeta);
  return x<(a+1)/(a+b+2)?bt*betacf(x,a,b)/a:1-bt*betacf(1-x,b,a)/b;
}
function betacf(x,a,b){
  let qab=a+b,qap=a+1,qam=a-1,c=1,d=1-qab*x/qap;
  if(Math.abs(d)<1e-30)d=1e-30; d=1/d; let h=d;
  for(let m=1;m<=100;m++){
    const m2=2*m;
    let aa=m*(b-m)*x/((qam+m2)*(a+m2));
    d=1+aa*d; if(Math.abs(d)<1e-30)d=1e-30; c=1+aa/c; if(Math.abs(c)<1e-30)c=1e-30;
    d=1/d; h*=d*c;
    aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
    d=1+aa*d; if(Math.abs(d)<1e-30)d=1e-30; c=1+aa/c; if(Math.abs(c)<1e-30)c=1e-30;
    d=1/d; const del=d*c; h*=del;
    if(Math.abs(del-1)<1e-10) break;
  }
  return h;
}
function lgamma(z){
  const c=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,.1208650973866179e-2,-.5395239384953e-5];
  let y=z,x=z,tmp=x+5.5;
  tmp-=(x+.5)*Math.log(tmp); let ser=1.000000000190015;
  for(const ci of c){ser+=ci/++y;}
  return -tmp+Math.log(2.5066282746310005*ser/x);
}
function chiPval(x,df){return 1-ibeta(x/(x+df),df/2,.5);}  // Actually use: 1 - regularized gamma
// simpler chi2 cdf via normal approx for display
function chi2Pval(chi2,df){
  if(chi2<=0) return 1;
  const z=((chi2/df)**(1/3)-(1-2/(9*df)))/Math.sqrt(2/(9*df));
  return 1-ncdf(z);
}

function L1con(){return `
<h1>การแจกแจงตัวอย่างและ p-value</h1>
<p class="sub">LAB 1 — SAMPLING DISTRIBUTION & HYPOTHESIS TESTING LOGIC</p>

<p>ก่อนทำ Hypothesis Testing ทุกประเภท ต้องเข้าใจคำถามพื้นฐานก่อน:<br>
<strong>"ถ้าสมมติฐานว่าง (H₀) เป็นจริง โอกาสที่จะได้ผลลัพธ์แบบนี้คือเท่าไร?"</strong></p>

<h2>ตรรกะการทดสอบสมมติฐาน</h2>
<div class="box amber">
<div class="box-title">⚠️ เราต้องการ "ปฏิเสธ" H₀ — ไม่ใช่ "ยอมรับ"</div>
ผลลัพธ์มีแค่ 2 แบบ: <strong>Reject H₀</strong> หรือ <strong>Fail to Reject H₀</strong><br>
การ "Fail to Reject" ≠ H₀ เป็นจริง — แค่ไม่มีหลักฐานพอที่จะปฏิเสธ<br>
เปรียบเทียบ: ศาลตัดสิน "ไม่มีความผิด" ≠ บริสุทธิ์จริง แต่หลักฐานไม่พอ
</div>

<h2>p-value คืออะไร</h2>
<div class="fcard">
  <div class="fcard-title">นิยาม p-value</div>
  <div class="frow"><span class="flabel">p-value =</span><span class="fval">P(ได้ค่าสถิติ <span class="hl">≥</span> ค่าที่สังเกต <span class="hl">|</span> H₀ เป็นจริง)</span></div>
  <div class="frow"><span class="flabel">ถ้า p &lt; α</span><span class="fval"><span class="hl2">Reject H₀</span></span><span class="fdesc">มีนัยสำคัญทางสถิติ</span></div>
  <div class="frow"><span class="flabel">ถ้า p ≥ α</span><span class="fval"><span class="hl3">Fail to Reject H₀</span></span><span class="fdesc">ไม่มีหลักฐานพอ</span></div>
  <div class="frow"><span class="flabel">SE = σ/√n</span><span class="fval">Standard Error ของ x̄</span><span class="fdesc">ลดลงเมื่อ n เพิ่ม</span></div>
</div>

<h2>สิ่งที่ p-value ไม่ได้หมายความ</h2>
<table class="ctbl">
<thead><tr><th>ความเข้าใจผิด</th><th>ความหมายที่ถูกต้อง</th></tr></thead>
<tbody>
<tr><td>p = 0.03 → H₀ มีโอกาสเป็นจริง 3%</td><td class="y">ไม่ถูก — p-value ไม่ใช่ความน่าจะเป็นของ H₀</td></tr>

function L1py(){return `
<h1>Python — คำนวณ p-value</h1>
<p class="sub">ฟังก์ชันสำหรับคำนวณและแปลความหมาย p-value</p>
<div class="pyblock"><div class="pyhead"><span class="pylang">python</span></div><div class="pybody"><pre><span class="kw">import</span> numpy <span class="kw">as</span> np
<span class="kw">from</span> scipy <span class="kw">import</span> stats

<span class="cm"># ═══ พารามิเตอร์ ═══</span>
mu0   = <span class="nm">50</span>       <span class="cm"># ค่าเฉลี่ยภายใต้ H₀</span>
x_bar = <span class="nm">53</span>       <span class="cm"># ค่าเฉลี่ยตัวอย่างที่สังเกต</span>
sigma = <span class="nm">10</span>       <span class="cm"># ส่วนเบี่ยงเบนมาตรฐานประชากร</span>
n     = <span class="nm">25</span>       <span class="cm"># ขนาดตัวอย่าง</span>
alpha = <span class="nm">0.05</span>     <span class="cm"># ระดับนัยสำคัญ</span>

<span class="cm"># ═══ คำนวณ ═══</span>
SE = sigma / np.<span class="fn">sqrt</span>(n)          <span class="cm"># Standard Error</span>
z  = (x_bar - mu0) / SE           <span class="cm"># z statistic</span>

<span class="cm"># p-value แต่ละแบบ</span>
p_two   = <span class="nm">2</span> * (<span class="nm">1</span> - stats.norm.<span class="fn">cdf</span>(np.<span class="fn">abs</span>(z)))  <span class="cm"># สองหาง</span>
p_right = <span class="nm">1</span> - stats.norm.<span class="fn">cdf</span>(z)               <span class="cm"># หางขวา</span>
p_left  = stats.norm.<span class="fn">cdf</span>(z)                    <span class="cm"># หางซ้าย</span>

<span class="cm"># ═══ แสดงผล ═══</span>
<span class="fn">print</span>(<span class="st">f"SE = {SE:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"z  = {z:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"p-value (สองหาง) = {p_two:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"ผล: {'Reject H₀' if p_two &lt; alpha else 'Fail to Reject H₀'}"</span>)

function L3con(){return `
<h1>One-Way ANOVA และ F-test</h1>
<p class="sub">LAB 3 — ANALYSIS OF VARIANCE</p>
<p>ANOVA ใช้เปรียบเทียบค่าเฉลี่ย <strong>3 กลุ่มขึ้นไป</strong> พร้อมกัน ควบคุม Type I error ไว้ที่ α</p>

</div>
<h2>การแยกความแปรปรวน (Variance Decomposition)</h2>
<div class="fcard">
  <div class="fcard-title">สูตร ANOVA</div>
  <div class="frow"><span class="flabel">SST = SSB + SSW</span><span class="fval">Total = Between + Within</span></div>
  <div class="frow"><span class="flabel">SSB</span><span class="fval">= Σ nᵢ(x̄ᵢ − x̄̄)²</span><span class="fdesc">ความแตกต่างระหว่างกลุ่ม</span></div>
  <div class="frow"><span class="flabel">SSW</span><span class="fval">= Σ Σ (xᵢⱼ − x̄ᵢ)²</span><span class="fdesc">ความผันแปรภายในกลุ่ม (error)</span></div>
  <div class="frow"><span class="flabel">MSB = SSB / (k−1)</span><span class="fval"><span class="hl">df₁ = k − 1</span></span><span class="fdesc">k = จำนวนกลุ่ม</span></div>
  <div class="frow"><span class="flabel">MSW = SSW / (N−k)</span><span class="fval"><span class="hl2">df₂ = N − k</span></span><span class="fdesc">N = จำนวนตัวอย่างทั้งหมด</span></div>
  <div class="frow"><span class="flabel">F = MSB / MSW</span><span class="fval"><span class="hl3">F ใหญ่ → Reject H₀</span></span><span class="fdesc">F ~ F(df₁, df₂)</span></div>
</div>
<h2>ANOVA Table</h2>
<table class="ctbl">
<thead><tr><th>แหล่ง</th><th>SS</th><th>df</th><th>MS = SS/df</th><th>F</th></tr></thead>
<tbody>
<tr><td>ระหว่างกลุ่ม (Between)</td><td>SSB</td><td>k−1</td><td>MSB</td><td>MSB/MSW</td></tr>
<tr><td>ภายในกลุ่ม (Within/Error)</td><td>SSW</td><td>N−k</td><td>MSW</td><td>—</td></tr>

ถ้า Reject H₀ → ต้องทำ <strong>Post-hoc test</strong> (Tukey, Bonferroni) เพื่อระบุคู่ที่ต่างกัน

function L3py(){return `
<h1>Python — ANOVA</h1>
<p class="sub">ใช้ scipy และ statsmodels สำหรับ ANOVA</p>
<div class="pyblock"><div class="pyhead"><span class="pylang">python</span></div><div class="pybody"><pre><span class="kw">from</span> scipy <span class="kw">import</span> stats
<span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="cm"># ─── ข้อมูล 3 กลุ่ม ─────────────────────────────</span>
g1 = np.<span class="fn">array</span>([<span class="nm">48</span>, <span class="nm">52</span>, <span class="nm">50</span>, <span class="nm">51</span>, <span class="nm">49</span>])
g2 = np.<span class="fn">array</span>([<span class="nm">55</span>, <span class="nm">58</span>, <span class="nm">54</span>, <span class="nm">57</span>, <span class="nm">56</span>])
g3 = np.<span class="fn">array</span>([<span class="nm">62</span>, <span class="nm">65</span>, <span class="nm">60</span>, <span class="nm">63</span>, <span class="nm">64</span>])

<span class="cm"># ─── One-Way ANOVA ─────────────────────────────</span>
F, p = stats.<span class="fn">f_oneway</span>(g1, g2, g3)
<span class="fn">print</span>(<span class="st">f"F = {F:.4f}, p = {p:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"ผล: {'Reject H₀' if p&lt;0.05 else 'Fail to Reject H₀'}"</span>)

<span class="cm"># ─── คำนวณ ANOVA table ด้วยมือ ──────────────────</span>
all_data = np.<span class="fn">concatenate</span>([g1, g2, g3])
grand_mean = all_data.<span class="fn">mean</span>()
N = <span class="fn">len</span>(all_data)
k = <span class="nm">3</span>

SSB = <span class="fn">sum</span>(<span class="fn">len</span>(g)*(g.<span class="fn">mean</span>()-grand_mean)**<span class="nm">2</span> <span class="kw">for</span> g <span class="kw">in</span> [g1,g2,g3])
SSW = <span class="fn">sum</span>(((g - g.<span class="fn">mean</span>())**<span class="nm">2</span>).<span class="fn">sum</span>() <span class="kw">for</span> g <span class="kw">in</span> [g1,g2,g3])
MSB = SSB / (k-<span class="nm">1</span>)
MSW = SSW / (N-k)
F_calc = MSB / MSW

<span class="fn">print</span>(<span class="st">f"\nSSB={SSB:.2f}, SSW={SSW:.2f}"</span>)
<span class="fn">print</span>(<span class="st">f"MSB={MSB:.2f}, MSW={MSW:.2f}, F={F_calc:.4f}"</span>)

<span class="cm"># ─── Post-hoc: Tukey HSD ────────────────────────</span>
<span class="kw">from</span> statsmodels.stats.multicomp <span class="kw">import</span> pairwise_tukeyhsd
<span class="kw">import</span> pandas <span class="kw">as</span> pd

data_long = np.<span class="fn">concatenate</span>([g1,g2,g3])
labels    = [<span class="st">'G1'</span>]*<span class="nm">5</span> + [<span class="st">'G2'</span>]*<span class="nm">5</span> + [<span class="st">'G3'</span>]*<span class="nm">5</span>
result = <span class="fn">pairwise_tukeyhsd</span>(data_long, labels, alpha=<span class="nm">0.05</span>)
<span class="fn">print</span>(result)
</pre></div></div>
<div class="navbtns"><button class="sec" onclick="gS(1)">← กลับ</button><button onclick="gS(3)">ต่อไป: Quiz →</button></div>`;}

function L4py(){return `
<h1>Python — Linear Regression</h1>

<div class="pyblock"><div class="pyhead"><span class="pylang">python</span></div><div class="pybody"><pre><span class="kw">import</span> numpy <span class="kw">as</span> np
<span class="kw">from</span> scipy <span class="kw">import</span> stats

<span class="cm"># ─── ข้อมูล ─────────────────────────────────────</span>
x = np.<span class="fn">array</span>([<span class="nm">2</span>,<span class="nm">3</span>,<span class="nm">4</span>,<span class="nm">5</span>,<span class="nm">6</span>,<span class="nm">7</span>,<span class="nm">8</span>,<span class="nm">9</span>,<span class="nm">10</span>])

<span class="cm"># ─── ใช้ scipy.stats ─────────────────────────────</span>
slope, intercept, r, p_val, se = stats.<span class="fn">linregress</span>(x, y)

<span class="fn">print</span>(<span class="st">f"β̂₁ (slope)     = {slope:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"β̂₀ (intercept) = {intercept:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"R              = {r:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"R²             = {r**2:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"p-value (β₁=0) = {p_val:.6f}"</span>)
<span class="fn">print</span>(<span class="st">f"ผล: {'มีนัยสำคัญ' if p_val&lt;0.05 else 'ไม่มีนัยสำคัญ'}"</span>)

<span class="cm"># ─── คำนวณด้วยมือเพื่อทำความเข้าใจ ──────────────</span>

<span class="fn">print</span>(<span class="st">f"\nSST={SST:.3f}, SSR={SSR:.3f}, SSE={SSE:.3f}, R²={R2:.4f}"</span>)

<div class="pyblock"><div class="pyhead"><span class="pylang">python</span></div><div class="pybody"><pre><span class="kw">from</span> scipy <span class="kw">import</span> stats
<span class="kw">import</span> numpy <span class="kw">as</span> np

crit = mu0 + z_alpha * SE               <span class="cm"># critical value</span>

<span class="cm"># β = P(ไม่ reject | μ = mu1)</span>
beta  = stats.norm.<span class="fn">cdf</span>(crit, loc=mu1, scale=SE)
power = <span class="nm">1</span> - beta

<span class="fn">print</span>(<span class="st">f"SE = {SE:.4f}"</span>)
<span class="fn">print</span>(<span class="st">f"Critical value = {crit:.4f}"</span>)

<span class="fn">print</span>(<span class="st">f"Power = 1−β = {power:.4f} ({power*100:.1f}%)"</span>)

<span class="cm"># ─── หา n ที่ต้องการให้ Power ≥ 80% ────────────</span>
target_power = <span class="nm">0.80</span>

n_required = ((z_alpha + z_beta) * sigma / (mu1 - mu0)) ** <span class="nm">2</span>

<span class="kw">from</span> statsmodels.stats.power <span class="kw">import</span> TTestPower
analysis = <span class="fn">TTestPower</span>()
effect_d = (mu1 - mu0) / sigma   <span class="cm"># Cohen's d</span>
pw = analysis.<span class="fn">power</span>(effect_size=effect_d, nobs=n, alpha=alpha)

function Q(id,q,opts,ans,fb){
  const os=opts.map((o,i)=>{
    const v=String.fromCharCode(97+i);
    return `<label class="qo"><input type="radio" name="${id}" value="${v}"><span>${o}</span></label>`;
  }).join('');
  return `<div class="qb"><div class="qq">${q}</div><div class="ql">${os}</div>
  <button style="margin-top:.6rem;" onclick="chkQ('${id}','${ans}','${fb.replace(/'/g,"\\'")}')">ตรวจคำตอบ</button>
  <div class="qfb" id="${id}-fb"></div></div>`;
}
function chkQ(id,correct,msg){
  const sel=document.querySelector(`input[name="${id}"]:checked`);
  const fb=document.getElementById(`${id}-fb`);
  if(!sel){fb.className='qfb show no';fb.textContent='⚠️ กรุณาเลือกคำตอบก่อน';return;}
  document.querySelectorAll(`[name="${id}"]`).forEach(r=>r.closest('.qo').classList.remove('correct','wrong'));
  const ok=sel.value===correct;
  sel.closest('.qo').classList.add(ok?'correct':'wrong');
  if(!ok) document.querySelectorAll(`[name="${id}"]`).forEach(r=>{if(r.value===correct)r.closest('.qo').classList.add('correct');});
  fb.className=`qfb show ${ok?'ok':'no'}`;
  fb.innerHTML=ok?msg:`❌ ไม่ถูก — ${msg}`;
  QS[id]=ok; updScore();
}
function updScore(){
  [1,2,3,4,5,6].forEach(l=>{
    const ids=[`q${l}a`,`q${l}b`,`q${l}c`,`q${l}c2`,`q${l}c3`,`q${l}c4`,`q${l}d`,`q${l}e`,`q${l}f`];
    const done=ids.filter(q=>QS[q]!==undefined);
    const ok=ids.filter(q=>QS[q]===true);
    const el=document.getElementById(`score-L${l}`);
    if(el&&done.length>0)el.textContent=`คะแนน: ${ok.length} / ${done.length} ข้อ`;
  });
  const all=Object.keys(QS),ok=all.filter(q=>QS[q]===true);
  const fe=document.getElementById('final-score');
  if(fe)fe.textContent=`คะแนนรวม: ${ok.length} / ${all.length} ข้อ (${Math.round(ok.length/Math.max(all.length,1)*100)}%)`;
}

function l1up(){
  const mu0=+document.getElementById('s-mu0').value;
  const xb=+document.getElementById('s-xb').value;
  const sg=+document.getElementById('s-sg').value;
  const n=+document.getElementById('s-n').value;
  const a=+document.getElementById('s-a').value;
  const tail=document.getElementById('s-t').value;
  ['mu0','xb','sg','n'].forEach(k=>document.getElementById('v-'+k).textContent=
    k==='mu0'?mu0:k==='xb'?xb:k==='sg'?sg:n);
  const se=sg/Math.sqrt(n),z=(xb-mu0)/se;
  let p=tail==='two'?2*(1-ncdf(Math.abs(z))):tail==='right'?1-ncdf(z):ncdf(z);
  const c=document.getElementById('c-l1');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fafaf8';ctx.fillRect(0,0,W,H);
  const lo=mu0-4.2*se,hi=mu0+4.2*se;
  const xS=v=>30+(v-lo)/(hi-lo)*(W-60);
  const yS=v=>H-22-v*(H-44);
  const zcrit=a===0.01?2.576:a===0.05?1.96:1.645;
  const cL=mu0-zcrit*se,cR=mu0+zcrit*se;
  const fill=(x0,x1,col)=>{
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(xS(x0),H-22);
    for(let x=x0;x<=x1;x+=(hi-lo)/300)ctx.lineTo(xS(x),yS(npdf(x,mu0,se)/npdf(mu0,mu0,se)));
    ctx.lineTo(xS(x1),H-22);ctx.closePath();ctx.fill();
  };
  if(tail==='two'||tail==='right')fill(cR,hi,'rgba(29,78,216,.18)');
  if(tail==='two'||tail==='left')fill(lo,cL,'rgba(29,78,216,.18)');
  ctx.beginPath();ctx.strokeStyle='#1d4ed8';ctx.lineWidth=2.5;
  for(let xi=0;xi<=W-60;xi++){const xv=lo+xi/(W-60)*(hi-lo);const yv=yS(npdf(xv,mu0,se)/npdf(mu0,mu0,se));xi===0?ctx.moveTo(30+xi,yv):ctx.lineTo(30+xi,yv);}
  ctx.stroke();
  const sv=Math.max(lo,Math.min(hi,xb));
  ctx.strokeStyle='#c2410c';ctx.lineWidth=2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(xS(sv),H-22);ctx.lineTo(xS(sv),12);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#c2410c';ctx.font='bold 12px Sarabun';ctx.textAlign='center';ctx.fillText('x̄='+xb,xS(sv),10);
  ctx.fillStyle='#1d4ed8';ctx.fillText('μ₀='+mu0,xS(mu0),H-6);
  ctx.strokeStyle='#d1d5db';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,H-22);ctx.lineTo(W-30,H-22);ctx.stroke();
  const reject=(tail==='two'&&Math.abs(z)>zcrit)||(tail==='right'&&z>zcrit)||(tail==='left'&&z<-zcrit);
  document.getElementById('r-l1').innerHTML=`
    <div class="rrow"><span>SE = σ/√n</span><span class="rv">${se.toFixed(4)}</span></div>
    <div class="rrow"><span>z = (x̄ − μ₀) / SE</span><span class="rv">${z.toFixed(4)}</span></div>
    <div class="rrow"><span>p-value (${tail})</span><span class="rv">${p.toFixed(4)}</span></div>
    <div class="rrow"><span>α = ${a}</span><span class="rv">${p<a?'p < α':'p ≥ α'}</span></div>
    <div class="verdict ${reject?'vr':'vf'}">${reject?'✗ Reject H₀ — มีนัยสำคัญทางสถิติ':'✓ Fail to Reject H₀ — ไม่มีนัยสำคัญ'}</div>`;
}

}

function l3up(){

    ctx.stroke();
    ctx.fillStyle=cols[ci];ctx.font='bold 12px Sarabun';ctx.textAlign='center';
    ctx.fillText('μ'+(ci+1)+'='+m,xS(m),H-6);
  });
  ctx.strokeStyle='#374151';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(xS(gm),H-22);ctx.lineTo(xS(gm),12);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#374151';ctx.font='11px Sarabun';ctx.textAlign='center';ctx.fillText('x̄̄='+gm.toFixed(1),xS(gm),10);
  ctx.strokeStyle='#d1d5db';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,H-22);ctx.lineTo(W-30,H-22);ctx.stroke();
  const reject=p<al;
  document.getElementById('l3tb').innerHTML=`
    <tr><td>ระหว่างกลุ่ม</td><td>${SSB.toFixed(2)}</td><td>${k-1}</td><td>${MSB.toFixed(2)}</td><td class="fval-cell">${F.toFixed(3)}</td><td>${p.toFixed(4)}</td><td style="color:${reject?'var(--coral)':'var(--teal)'};font-weight:600">${reject?'Reject H₀':'Fail to Reject'}</td></tr>
    <tr><td>ภายในกลุ่ม</td><td>${SSW.toFixed(2)}</td><td>${N-k}</td><td>${MSW.toFixed(2)}</td><td>—</td><td>—</td><td>—</td></tr>
    <tr class="tot"><td>รวม</td><td>${SST.toFixed(2)}</td><td>${N-1}</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>`;
  document.getElementById('r-l3').innerHTML=`
    <div class="rrow"><span>F = MSB/MSW</span><span class="rv">${F.toFixed(4)}</span></div>
    <div class="rrow"><span>p-value (F-dist)</span><span class="rv">${p.toFixed(4)}</span></div>
    <div class="verdict ${reject?'vr':'vf'}">${reject?'✗ Reject H₀ — ค่าเฉลี่ยบางกลุ่มต่างกัน':'✓ Fail to Reject H₀ — ไม่มีหลักฐานความแตกต่าง'}</div>`;
}

// ══════════════════════════════════════════════════════
// LAB 4 SCATTER
// ══════════════════════════════════════════════════════
let l4pts=[];
function l4rst(){l4pts=[];l4draw();}
function l4smp(){l4pts=[[2,4.2],[3,5.8],[4,7.1],[5,8.0],[6,9.4],[7,10.9],[8,11.8],[9,13.2],[10,14.0]];l4draw();}
function l4smp2(){l4pts=[[1,8],[2,3],[3,9],[4,5],[5,12],[6,6],[7,14],[8,9],[9,15],[10,11]];l4draw();}
function l4add(e){
  const c=document.getElementById('c-l4');if(!c)return;
  const r=c.getBoundingClientRect();
  const px=(e.clientX-r.left)*(c.width/r.width);
  const py=(e.clientY-r.top)*(c.height/r.height);
  const W=c.width,H=c.height,pd=45;
  const xv=1+(px-pd)/(W-2*pd)*14,yv=20-(py-pd)/(H-2*pd)*20;
  if(xv<1||xv>15||yv<0||yv>20)return;
  l4pts.push([+xv.toFixed(1),+yv.toFixed(1)]);l4draw();
}
function l4draw(){
  const c=document.getElementById('c-l4');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height,pd=45;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fafaf8';ctx.fillRect(0,0,W,H);
  const xS=v=>pd+(v-1)/14*(W-2*pd),yS=v=>H-pd-(v/20)*(H-2*pd);
  ctx.strokeStyle='#e5e7eb';ctx.lineWidth=1;
  for(let x=1;x<=15;x+=2){ctx.beginPath();ctx.moveTo(xS(x),pd);ctx.lineTo(xS(x),H-pd);ctx.stroke();}
  for(let y=0;y<=20;y+=5){ctx.beginPath();ctx.moveTo(pd,yS(y));ctx.lineTo(W-pd,yS(y));ctx.stroke();}
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pd,H-pd);ctx.lineTo(W-pd,H-pd);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pd,H-pd);ctx.lineTo(pd,pd);ctx.stroke();
  ctx.fillStyle='#9ca3af';ctx.font='11px Sarabun';ctx.textAlign='center';
  [1,5,10,15].forEach(v=>ctx.fillText(v,xS(v),H-pd+13));
  ctx.textAlign='right';[0,5,10,15,20].forEach(v=>ctx.fillText(v,pd-5,yS(v)+4));
  if(l4pts.length<2){
    l4pts.forEach(([x,y])=>{ctx.beginPath();ctx.arc(xS(x),yS(y),5,0,Math.PI*2);ctx.fillStyle='#1d4ed8';ctx.fill();});
    const ri=document.getElementById('r-l4');if(ri)ri.innerHTML='<div style="color:var(--muted)">เพิ่มจุดอย่างน้อย 3 จุด</div>';return;
  }
  const n=l4pts.length;
  const xm=l4pts.reduce((a,[x])=>a+x,0)/n,ym=l4pts.reduce((a,[,y])=>a+y,0)/n;
  const sxx=l4pts.reduce((a,[x])=>a+(x-xm)**2,0),sxy=l4pts.reduce((a,[x,y])=>a+(x-xm)*(y-ym),0);
  const b1=sxy/sxx,b0=ym-b1*xm;
  const yhat=l4pts.map(([x])=>b0+b1*x);
  const sst=l4pts.reduce((a,[,y])=>a+(y-ym)**2,0);
  const sse=l4pts.reduce((a,[,y],i)=>a+(y-yhat[i])**2,0);
  const ssr=sst-sse,r2=ssr/sst;
  if(document.getElementById('showR')?.checked){
    ctx.strokeStyle='rgba(194,65,12,.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    l4pts.forEach(([x,y],i)=>{ctx.beginPath();ctx.moveTo(xS(x),yS(y));ctx.lineTo(xS(x),yS(yhat[i]));ctx.stroke();});
    ctx.setLineDash([]);
  }
  ctx.strokeStyle='#0f766e';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(xS(1),yS(b0+b1*1));ctx.lineTo(xS(15),yS(b0+b1*15));ctx.stroke();
  l4pts.forEach(([x,y])=>{ctx.beginPath();ctx.arc(xS(x),yS(y),5.5,0,Math.PI*2);ctx.fillStyle='#1d4ed8';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();});
  ctx.fillStyle='#0f766e';ctx.font='bold 11px IBM Plex Mono';ctx.textAlign='left';
  ctx.fillText(`ŷ = ${b0.toFixed(2)} + ${b1.toFixed(2)}x   R² = ${r2.toFixed(3)}`,pd+4,pd-4);
  const ri=document.getElementById('r-l4');
  if(ri)ri.innerHTML=`
    <div class="rrow"><span>β̂₀ (intercept)</span><span class="rv">${b0.toFixed(4)}</span></div>
    <div class="rrow"><span>β̂₁ (slope)</span><span class="rv">${b1.toFixed(4)}</span></div>
    <div class="rrow"><span>R²</span><span class="rv">${r2.toFixed(4)}</span></div>
    <div class="rrow"><span>SST / SSR / SSE</span><span class="rv">${sst.toFixed(2)} / ${ssr.toFixed(2)} / ${sse.toFixed(2)}</span></div>`;
  const ii=document.getElementById('info-l4');if(ii)ii.textContent=`n = ${n} จุด`;
}

// ══════════════════════════════════════════════════════
// LAB 5 CHI-SQUARE
// ══════════════════════════════════════════════════════
let chiO=[[40,30,20],[25,35,50]];
let chiInited=false;
function initChi(){
  if(chiInited)return; chiInited=true;
  buildChiGrid();
}
function buildChiGrid(){
  const wrap=document.getElementById('chi-wrap');if(!wrap)return;
  const rows=['กลุ่ม A','กลุ่ม B'],cols=['ประเภท 1','ประเภท 2','ประเภท 3'];
  let h=`<div style="overflow-x:auto;"><table style="border-collapse:collapse;font-size:13px;width:100%;">
    <thead><tr><th style="padding:.4rem .7rem;border:1px solid var(--border);background:var(--surface2);"></th>`;
  cols.forEach(c=>h+=`<th style="padding:.4rem .7rem;border:1px solid var(--border);background:var(--surface2);">${c}</th>`);
  h+=`<th style="padding:.4rem .7rem;border:1px solid var(--border);background:var(--surface2);">รวม</th></tr></thead><tbody>`;
  chiO.forEach((row,ri)=>{
    h+=`<tr><td style="padding:.4rem .7rem;border:1px solid var(--border);font-weight:600;background:var(--surface2);">${rows[ri]}</td>`;
    row.forEach((v,ci)=>h+=`<td style="padding:.2rem .3rem;border:1px solid var(--border);">
      <input type="number" value="${v}" min="0" style="width:62px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:.25rem;font-family:var(--mono);font-size:13px;"
      oninput="chiO[${ri}][${ci}]=+this.value||0;chiCalc()"></td>`);
    h+=`<td style="padding:.4rem .7rem;border:1px solid var(--border);font-family:var(--mono);font-weight:600;" id="rt${ri}">${row.reduce((a,b)=>a+b,0)}</td></tr>`;
  });
  h+=`<tr><td style="padding:.4rem .7rem;border:1px solid var(--border);font-weight:600;background:var(--surface2);">รวม</td>`;
  cols.forEach((_,ci)=>h+=`<td style="padding:.4rem .7rem;border:1px solid var(--border);font-family:var(--mono);" id="ct${ci}">—</td>`);
  h+=`<td style="padding:.4rem .7rem;border:1px solid var(--border);font-family:var(--mono);font-weight:700;" id="cgt">—</td></tr>`;
  h+=`</tbody></table></div>`;
  wrap.innerHTML=h;chiCalc();
}
function chiCalc(){
  const r=chiO.length,c=chiO[0].length;
  const rT=chiO.map(row=>row.reduce((a,b)=>a+b,0));
  const cT=Array.from({length:c},(_,ci)=>chiO.reduce((a,row)=>a+row[ci],0));
  const grand=rT.reduce((a,b)=>a+b,0);
  rT.forEach((v,i)=>{const e=document.getElementById('rt'+i);if(e)e.textContent=v;});
  cT.forEach((v,i)=>{const e=document.getElementById('ct'+i);if(e)e.textContent=v;});
  const ge=document.getElementById('cgt');if(ge)ge.textContent=grand;
  const E=chiO.map((row,ri)=>row.map((_,ci)=>rT[ri]*cT[ci]/grand));
  const contrib=chiO.map((row,ri)=>row.map((o,ci)=>{const e=E[ri][ci];return e>0?(o-e)**2/e:0;}));
  const chi2=contrib.flat().reduce((a,b)=>a+b,0);
  const df=(r-1)*(c-1);
  const p=chi2Pval(chi2,df);
  const el=document.getElementById('r-l5');
  if(el)el.innerHTML=`
    <div class="rrow"><span>χ² statistic</span><span class="rv">${chi2.toFixed(4)}</span></div>
    <div class="rrow"><span>df = (r−1)(c−1)</span><span class="rv">${df}</span></div>
    <div class="rrow"><span>p-value</span><span class="rv">${p.toFixed(4)}</span></div>
    <div class="rrow"><span>Expected ทุกช่อง ≥ 5?</span><span class="rv">${E.flat().every(v=>v>=5)?'✓ ใช่':'⚠️ บางช่อง &lt; 5'}</span></div>
    <div class="verdict ${p<0.05?'vr':'vf'}">${p<0.05?'✗ Reject H₀ — ตัวแปรสัมพันธ์กัน (not independent)':'✓ Fail to Reject H₀ — ไม่มีหลักฐานว่าสัมพันธ์'}</div>`;
  drawContrib(contrib);
}
function drawContrib(ct){
  const c=document.getElementById('c-l5');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fafaf8';ctx.fillRect(0,0,W,H);
  const nr=ct.length,nc=ct[0].length;
  const flat=ct.flat(),mx=Math.max(...flat,0.01);
  const cw=(W-70)/nc,ch=(H-30)/nr;
  ['กลุ่ม A','กลุ่ม B'].forEach((l,i)=>{ctx.fillStyle='#6b7280';ctx.font='11px Sarabun';ctx.textAlign='right';ctx.fillText(l,64,i*ch+ch/2+4);});
  ['ประเภท 1','ประเภท 2','ประเภท 3'].forEach((l,i)=>{ctx.fillStyle='#6b7280';ctx.font='11px Sarabun';ctx.textAlign='center';ctx.fillText(l,70+i*cw+cw/2,H-10);});
  ct.forEach((row,ri)=>row.forEach((v,ci)=>{
    const t=v/mx;
    const r2=Math.round(29+t*(194-29)),g=Math.round(78+t*(65-78)),b2=Math.round(216+t*(60-216));
    ctx.fillStyle=`rgb(${r2},${g},${b2})`;
    ctx.fillRect(70+ci*cw,ri*ch,cw-2,ch-2);
    ctx.fillStyle=t>0.5?'#fff':'#1a1916';ctx.font='11px Sarabun';ctx.textAlign='center';
    ctx.fillText(v.toFixed(2),70+ci*cw+cw/2,ri*ch+ch/2+4);
  }));
}

// ══════════════════════════════════════════════════════
// LAB 6 POWER
// ══════════════════════════════════════════════════════
function l6up(){
  const es=+document.getElementById('s-es').value;
  const s=+document.getElementById('s-s6').value;
  const n=+document.getElementById('s-n6').value;
  const a=+document.getElementById('s-a6').value;
  document.getElementById('v-es').textContent=es.toFixed(1);
  document.getElementById('v-s6').textContent=s.toFixed(1);
  document.getElementById('v-n6').textContent=n;
  const se=s/Math.sqrt(n);
  const za=a===0.01?2.326:a===0.05?1.645:1.282;
  const crit=za*se,mu1=es;
  const beta=ncdf((crit-mu1)/se),power=1-beta;
  const c=document.getElementById('c-l6');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fafaf8';ctx.fillRect(0,0,W,H);
  const lo=Math.min(0,mu1)-4.5*se,hi=Math.max(0,mu1)+4.5*se;
  const xS=v=>35+(v-lo)/(hi-lo)*(W-70);
  const yS=v=>H-28-v*(H-56);
  const pk=npdf(0,0,se);
  const fillR=(mu,x0,x1,col)=>{ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(xS(x0),H-28);for(let x=x0;x<=x1;x+=(hi-lo)/400)ctx.lineTo(xS(x),yS(npdf(x,mu,se)/pk));ctx.lineTo(xS(x1),H-28);ctx.closePath();ctx.fill();};
  fillR(0,crit,hi,'rgba(194,65,12,.22)');
  fillR(mu1,lo,crit,'rgba(180,83,9,.16)');
  fillR(mu1,crit,hi,'rgba(15,118,110,.22)');
  [[0,'#1d4ed8'],[mu1,'#0f766e']].forEach(([mu,col])=>{
    ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=2.5;
    for(let xi=0;xi<=W-70;xi++){const xv=lo+xi/(W-70)*(hi-lo);const yv=yS(npdf(xv,mu,se)/pk);xi===0?ctx.moveTo(35+xi,yv):ctx.lineTo(35+xi,yv);}
    ctx.stroke();
  });
  ctx.strokeStyle='#374151';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(xS(crit),H-28);ctx.lineTo(xS(crit),12);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#374151';ctx.font='11px Sarabun';ctx.textAlign='center';ctx.fillText('critical',xS(crit),10);
  ctx.fillStyle='#1d4ed8';ctx.font='bold 12px Sarabun';ctx.textAlign='center';ctx.fillText('H₀: μ=0',xS(0),H-10);
  ctx.fillStyle='#0f766e';ctx.fillText(`H₁: μ=${mu1.toFixed(1)}`,xS(mu1),H-1);
  ctx.strokeStyle='#d1d5db';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(35,H-28);ctx.lineTo(W-35,H-28);ctx.stroke();
  const legend=[['α = Type I Error = '+(a*100).toFixed(0)+'%','#c2410c'],['β = Type II Error = '+(beta*100).toFixed(1)+'%','#b45309'],['Power = 1−β = '+(power*100).toFixed(1)+'%','#0f766e']];
  legend.forEach(([txt,col],i)=>{ctx.fillStyle=col+'aa';ctx.fillRect(W-195,18+i*18,10,10);ctx.fillStyle='#374151';ctx.font='11px Sarabun';ctx.textAlign='left';ctx.fillText(txt,W-181,18+i*18+9);});
  document.getElementById('r-l6').innerHTML=`
    <div class="rrow"><span>SE = σ/√n</span><span class="rv">${se.toFixed(4)}</span></div>
    <div class="rrow"><span>ค่าวิกฤต</span><span class="rv">${crit.toFixed(4)}</span></div>
    <div class="rrow"><span>α (Type I Error)</span><span class="rv">${(a*100).toFixed(0)}%</span></div>
    <div class="rrow"><span>β (Type II Error)</span><span class="rv">${(beta*100).toFixed(1)}%</span></div>
    <div class="rrow"><span>Power = 1−β</span><span class="rv" style="color:var(--teal)">${(power*100).toFixed(1)}%</span></div>`;
}
